<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shield body -->
  <path d="M 32 4 L 60 18 L 60 38 C 60 50 46 60 32 62 C 18 60 4 50 4 38 L 4 18 Z" fill="#0B1E3D"/>
  <!-- Gold border — 3px inset, stroke-width 2.5 so it survives favicon scale -->
  <path d="M 32 7 L 57 20 L 57 38 C 57 49 44 59 32 61 C 20 59 7 49 7 38 L 7 20 Z" fill="none" stroke="#F5A623" stroke-width="2.5"/>
  <!-- R&D: y=37 centers visually accounting for pointed bottom (shield visual center ~y=34) -->
  <text
    x="32"
    y="37"
    font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
    font-weight="900"
    font-size="18"
    fill="#F5A623"
    text-anchor="middle"
    dominant-baseline="alphabetic"
    letter-spacing="0.5"
  >R&amp;D</text>
</svg>
