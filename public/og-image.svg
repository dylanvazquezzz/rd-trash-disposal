<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060f1e"/>
  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0B1E3D" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#F5A623"/>
  <!-- Shield mark (large, left-center) -->
  <g transform="translate(120, 115) scale(6.25)">
    <path d="M 32 4 L 60 18 L 60 38 C 60 50 46 60 32 62 C 18 60 4 50 4 38 L 4 18 Z" fill="#0B1E3D" stroke="#F5A623" stroke-width="1.5"/>
    <path d="M 32 10 L 54 22 L 54 38 C 54 47 43 55 32 57 C 21 55 10 47 10 38 L 10 22 Z" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.4"/>
    <text x="32" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="21" fill="#F5A623" text-anchor="middle" letter-spacing="-1">R&amp;D</text>
  </g>
  <!-- Company name -->
  <text x="570" y="260" font-family="Arial Black, Arial" font-weight="900" font-size="82" fill="#ffffff" letter-spacing="-2">R&amp;D</text>
  <text x="570" y="360" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-1">Trash Disposal</text>
  <!-- Tagline -->
  <text x="570" y="420" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="#F5A623" letter-spacing="2">JUNK REMOVAL &amp; DEMOLITION</text>
  <!-- Bottom rule -->
  <rect x="570" y="460" width="580" height="4" fill="#F5A623" opacity="0.5" rx="2"/>
</svg>
